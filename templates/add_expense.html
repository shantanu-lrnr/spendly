{% extends "base.html" %}

{% block title %}Add Expense — Spendly{% endblock %}

{% block head %}
<link rel="stylesheet" href="{{ url_for('static', filename='css/add_expense.css') }}">
{% endblock %}

{% block content %}

<section class="auth-section">
    <div class="auth-container">

        <div class="auth-header">
            <h1 class="auth-title">Add expense</h1>
            <p class="auth-subtitle">Record a new expense to your account</p>
        </div>

        <div class="auth-card">
            {% if error %}
            <div class="auth-error">{{ error }}</div>
            {% endif %}

            <form method="POST" action="{{ url_for('add_expense') }}">

                <div class="form-group">
                    <label for="amount">Amount</label>
                    <div class="add-amount-wrap">
                        <input type="number" id="amount" name="amount"
                               class="form-input add-amount-input"
                               placeholder="0.00"
                               step="0.01" min="0.01"
                               inputmode="decimal"
                               value="{{ amount or '' }}"
                               required autofocus>
                    </div>
                </div>

                <div class="form-group">
                    <label for="category">Category</label>
                    <select id="category" name="category" class="form-input add-select" required>
                        <option value="" disabled {% if not category %}selected{% endif %}>Select a category</option>
                        {% for c in categories %}
                        <option value="{{ c }}" {% if category == c %}selected{% endif %}>{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="form-group">
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"
                           class="form-input"
                           value="{{ date or today }}"
                           required>
                </div>

                <div class="form-group">
                    <label for="description">Description</label>
                    <input type="text" id="description" name="description"
                           class="form-input"
                           placeholder="e.g. Lunch at café"
                           maxlength="200"
                           value="{{ description or '' }}">
                    <p class="add-help">Optional</p>
                </div>

                <button type="submit" class="btn-submit">
                    <i data-lucide="plus"></i> Add expense
                </button>

            </form>
        </div>

        <p class="auth-switch">
            <a href="{{ url_for('profile') }}">Cancel — back to profile</a>
        </p>

    </div>
</section>

{% endblock %}
